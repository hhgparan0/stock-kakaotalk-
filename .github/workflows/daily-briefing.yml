name: daily-stock-briefing

on:
  schedule:
    # 01:07 UTC = 한국시간 오전 10:07 → 미국 반도체 + 공포지수 (월~금)
    - cron: "7 1 * * 1-5"
    # 05:07 UTC = 한국시간 오후 14:07 → 코스피 + 삼성전자/하이닉스 (월~금)
    - cron: "7 5 * * 1-5"
  workflow_dispatch:
    inputs:
      market:
        description: "수동 실행 시장 (us 또는 kr)"
        default: "us"

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Decide market
        id: m
        shell: bash
        run: |
          if [ "${{ github.event.schedule }}" = "7 5 * * 1-5" ]; then
            echo "market=kr" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.market }}" ]; then
            echo "market=${{ github.event.inputs.market }}" >> "$GITHUB_OUTPUT"
          else
            echo "market=us" >> "$GITHUB_OUTPUT"
          fi
      - name: Send briefing to KakaoTalk
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python send_briefing.py ${{ steps.m.outputs.market }}
